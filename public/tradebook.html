<title>Trade Book — Castle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hedvig+Letters+Serif:opsz@12..24&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-y:scroll}
body{font-family:'Geist',sans-serif;font-size:14px;color:#171717;background:#fff;-webkit-font-smoothing:antialiased}
:root{
  --ink:#171717;--ink-2:#383832;--ink-3:#55554E;--ink-4:#6B6B63;--ink-5:#9A9A90;--ink-6:#A0A096;
  --border:rgba(24,24,24,0.09);--border-m:rgba(24,24,24,0.11);--border-s:rgba(24,24,24,0.06);
  --bg1:#FAFAF8;--bg2:#F5F5F2;--bg3:#F0F0EC;
  --mono:'Geist',sans-serif;
  --serif:'Hedvig Letters Serif',serif;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#e4e4de;border-radius:6px;border:2px solid #fff}
input,textarea{appearance:none;-webkit-appearance:none;font-family:inherit}
input:focus,textarea:focus{outline:none}
button{font-family:inherit;cursor:pointer;border:none}

/* Topbar */
.bar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.bar-in{max-width:1140px;margin:0 auto;padding:0 56px;height:54px;display:flex;align-items:center;gap:11px}
.castle-word{font-family:var(--serif);font-size:16px;font-weight:400;letter-spacing:-.04em;color:var(--ink)}
.bar-sep{width:1px;height:14px;background:rgba(24,24,24,.15);margin:0 3px}
.bar-label{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.16em;color:var(--ink-5)}
.bar-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn-out{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--ink-2);background:#fff;border:1px solid rgba(24,24,24,.16);border-radius:999px;padding:7px 15px;cursor:pointer;transition:border-color .15s}
.btn-out:hover{border-color:rgba(24,24,24,.32)}
.btn-solid{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#fff;background:var(--ink);border-radius:999px;padding:8px 17px;cursor:pointer;transition:opacity .15s}
.btn-solid:hover{opacity:.84}
.btn-primary{display:inline-flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600;color:#fff;background:var(--ink);border-radius:999px;padding:12px 22px;cursor:pointer;transition:opacity .15s;border:none}
.btn-primary:hover{opacity:.84}
.btn-primary[disabled]{opacity:.4;cursor:not-allowed}
.btn-ghost{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--ink-2);background:#F4F4F0;border:1px solid #E4E4DC;border-radius:999px;padding:9px 16px;cursor:pointer;transition:background .15s}
.btn-ghost:hover{background:#ECECE5}

/* List */
.list-wrap{max-width:1140px;margin:0 auto;padding:32px 56px 90px}
.tabs{display:flex;gap:26px;border-bottom:1px solid var(--border)}
.tab{padding:0 1px 13px;font-size:14px;font-weight:600;cursor:pointer;color:var(--ink-5);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
.tab.on{color:var(--ink);border-bottom-color:var(--ink)}
.tab-ct{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--ink-6);margin-left:4px}
.tbl-head{display:grid;grid-template-columns:2.7fr 3fr 1fr .8fr 1.25fr 26px;gap:18px;padding:16px 8px 12px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.12em;color:var(--ink-6)}
.tbl-row{display:grid;grid-template-columns:2.7fr 3fr 1fr .8fr 1.25fr 26px;gap:18px;align-items:center;padding:17px 8px;border-bottom:1px solid var(--border-s);cursor:pointer;transition:background .1s}
.tbl-row:hover{background:var(--bg1)}
.row-co{font-size:14px;font-weight:600;color:var(--ink);line-height:1.25}
.row-ref{font-family:var(--mono);font-size:11px;color:var(--ink-6);margin-top:2px}
.row-ev{font-size:13px;color:var(--ink-3);line-height:1.45}
.row-cov{text-align:right;font-family:var(--mono);font-size:13.5px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
.row-imp{text-align:right;font-family:var(--mono);font-size:13px;color:var(--ink-3);font-variant-numeric:tabular-nums}
.badge{display:inline-flex;align-items:center;font-size:11.5px;font-weight:600;border-radius:999px;padding:4px 11px}

/* Detail */
.det-wrap{max-width:1040px;margin:0 auto;padding:30px 56px 90px}
.back-btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--ink-4);cursor:pointer;background:none;border:none;transition:color .15s;padding:0}
.back-btn:hover{color:var(--ink)}
.det-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-top:20px}
.trade-name{font-family:var(--serif);font-size:27px;font-weight:400;letter-spacing:-.012em;line-height:1.1;color:var(--ink)}
.det-meta{display:flex;align-items:center;gap:12px;margin-top:9px;flex-wrap:wrap}
.det-ref{font-family:var(--mono);font-size:11.5px;color:var(--ink-6)}
.det-status{font-size:12px;color:var(--ink-4)}
.tiles{display:flex;border:1px solid rgba(24,24,24,.10);border-radius:10px;overflow:hidden;flex:none}
.tile{padding:12px 20px}
.tile:not(:last-child){border-right:1px solid rgba(24,24,24,.08)}
.tile-lbl{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.12em;color:var(--ink-6)}
.tile-val{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--ink);margin-top:5px;font-variant-numeric:tabular-nums}

/* Phase nav */
.phase-nav{display:flex;align-items:stretch;margin-top:28px;border:1px solid rgba(24,24,24,.10);border-radius:12px;overflow:hidden}
.ph-item{flex:1;display:flex;align-items:center;gap:11px;padding:15px 18px;background:#fff;transition:background .1s}
.ph-item:not(:first-child){border-left:1px solid rgba(24,24,24,.08)}
.ph-item.viewing{background:var(--bg1)}
.ph-item.clickable{cursor:pointer}
.ph-dot{flex:none;width:22px;height:22px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10.5px;font-weight:600}
.ph-dot.done{background:var(--ink);color:#fff;font-size:11px}
.ph-dot.cur{background:var(--ink);color:#fff}
.ph-dot.locked{background:#fff;border:1px solid #D6D6CE;color:#B0B0A6}
.ph-label{font-size:13px;font-weight:600;letter-spacing:-.008em;white-space:nowrap}
.ph-sub{font-family:var(--mono);font-size:9.5px;font-weight:500;letter-spacing:.08em;margin-top:2px;white-space:nowrap}

/* Panels */
.panel{margin-top:30px;animation:fadein .25s ease}
.p-label{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.13em;color:var(--ink-6);margin-bottom:12px}
.fld-lbl{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.1em;color:#7A7A70;display:block;margin-bottom:7px}
.fld-in{width:100%;border:1px solid #E2E2DA;border-radius:7px;padding:9px 11px;font-size:13.5px;font-weight:500;color:var(--ink);background:#fff;transition:border-color .15s}
.fld-in:focus{border-color:var(--ink)}
.fld-ta{width:100%;border:1px solid #E2E2DA;border-radius:7px;padding:10px 12px;font-size:13.5px;color:var(--ink);resize:vertical;line-height:1.6;background:#fff;transition:border-color .15s}
.fld-ta:focus{border-color:var(--ink)}

/* Sent pill / notices */
.sent-pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:#2A2A26;background:#EDEFEA;border:1px solid #DDE0D6;border-radius:999px;padding:5px 11px}
.empty{border:1px dashed #D9D9D1;border-radius:12px;padding:30px 24px;text-align:center;color:var(--ink-4);font-size:13px;line-height:1.6}

/* Contract */
.ct-grid{display:grid;grid-template-columns:1fr 318px;gap:28px;align-items:start}
.gdoc{border:1px solid var(--border-m);border-radius:12px;background:#fff;overflow:hidden}
.gdoc-bar{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid #ECECE6}
.gdoc-title{font-size:13px;color:#202124}
.gdoc-link{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:#171717;text-decoration:none}
.gdoc-link:hover{text-decoration:underline}
.gdoc-body{background:#F4F5F6;padding:26px 22px;max-height:440px;overflow-y:auto}
.gdoc-inner{background:#fff;box-shadow:0 1px 3px rgba(60,64,67,.16);border-radius:2px;padding:40px 46px;color:#202124}
.doc-kicker{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.16em;color:var(--ink-6)}
.doc-q{font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:-.01em;line-height:1.3;margin:13px 0 0;color:var(--ink)}
.doc-meta{font-size:12px;color:#9A9A90;margin-top:8px;border-bottom:1px solid #ECECE6;padding-bottom:15px}
.doc-p{font-size:12.5px;line-height:1.75;color:#2C2C28;margin:13px 0 0;text-align:justify}
.doc-p em{font-style:italic}
.doc-ul{margin:9px 0 0 18px}
.doc-ul li{font-size:12.5px;line-height:1.7;color:#2C2C28;margin-top:4px}
.doc-strikes{margin-top:10px;border:1px solid #E6E6E0;border-radius:6px;overflow:hidden;display:flex;flex-wrap:wrap}
.doc-strike{font-family:var(--mono);font-size:11px;color:#3D3D38;padding:7px 12px;border-right:1px solid #EFEFE9;border-bottom:1px solid #EFEFE9}

/* Suggestions / edit requests */
.sugg-rail{position:sticky;top:24px}
.sugg-list{border:1px solid var(--border-m);border-radius:12px;background:#fff;margin-top:12px;padding:16px}
.sugg-card{border-radius:9px;padding:12px 13px}
.sugg-who{display:flex;align-items:center;gap:7px}
.sugg-av{width:20px;height:20px;border-radius:999px;background:#EDECE6;color:#55554E;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:600;flex:none}
.sugg-name{font-size:11.5px;font-weight:600;color:#383832}
.sugg-acc{margin-left:auto;display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;color:#2A2A26}
.sugg-txt{font-size:12.5px;color:#4A4A44;line-height:1.5;margin-top:8px}
.sugg-btns{display:flex;gap:8px;margin-top:11px}
.s-accept{flex:1;font-size:12px;font-weight:600;color:#fff;background:var(--ink);border-radius:7px;padding:7px 0;cursor:pointer;border:none}
.s-dismiss{flex:1;font-size:12px;font-weight:600;color:#6B6B63;background:#fff;border:1px solid #E2E2DA;border-radius:7px;padding:7px 0;cursor:pointer}
.sugg-add{margin-top:14px;padding-top:14px;border-top:1px solid #EFEFE9}
.sugg-ta{width:100%;border:1px solid #E2E2DA;border-radius:7px;padding:9px 11px;font-size:12.5px;color:var(--ink);resize:vertical;line-height:1.5}
.sugg-ta:focus{border-color:var(--ink);outline:none}
.sugg-add-btn{width:100%;margin-top:9px;font-size:12.5px;font-weight:600;color:#383832;background:#F4F4F0;border:1px solid #E2E2DA;border-radius:7px;padding:8px 0;cursor:pointer}
.sugg-add-btn:hover{background:#EDEDE7}
.share-note{font-size:11px;color:var(--ink-5);line-height:1.5;margin-top:10px}

/* Listing */
.listing-card{border:1px solid rgba(24,24,24,.10);border-radius:12px;background:#fff;padding:64px 40px;display:flex;flex-direction:column;align-items:center;text-align:center}
.spinner{width:38px;height:38px;border:3px solid #ECECE6;border-top-color:var(--ink);border-radius:999px;animation:spin .8s linear infinite}
.listing-t{font-family:var(--serif);font-size:21px;font-weight:400;letter-spacing:-.01em;color:var(--ink);margin-top:24px}
.listing-s{font-size:13.5px;color:#6B6B63;margin-top:8px;max-width:400px;line-height:1.55}
.listing-steps{display:flex;flex-direction:column;gap:10px;margin-top:28px;width:330px}
.ls-step{display:flex;align-items:center;gap:10px;font-size:12.5px}
.ls-dot{flex:none;width:17px;height:17px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:9px}

/* Exchange */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid rgba(24,24,24,.10);border-radius:12px;overflow:hidden}
.m-tile{padding:18px 20px}
.m-tile:not(:last-child){border-right:1px solid rgba(24,24,24,.07)}
.m-lbl{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.12em;color:var(--ink-6)}
.m-val{font-family:var(--mono);font-size:21px;font-weight:600;color:var(--ink);margin-top:8px;font-variant-numeric:tabular-nums}
.m-sub{font-size:11px;color:#8A8A80;margin-top:4px}
.chart-card{border:1px solid rgba(24,24,24,.10);border-radius:12px;background:#fff;margin-top:16px;padding:20px 24px}
.chart-hd{display:flex;align-items:center;justify-content:space-between}
.chart-t{font-size:13.5px;font-weight:600;color:var(--ink)}
.live-ind{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;font-weight:500;color:#8A8A80}
.live-dot{width:7px;height:7px;border-radius:999px;background:var(--ink);animation:pulse 1.8s ease-in-out infinite}
.ex-lower{display:grid;grid-template-columns:1fr 1.25fr;gap:16px;margin-top:16px;align-items:start}
.ex-card{border:1px solid rgba(24,24,24,.10);border-radius:12px;background:#fff;padding:20px 22px}
.ex-card-t{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600;color:var(--ink)}
.rw-list{margin-top:14px}
.rw-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F2F2EC}
.rw-row:last-child{border-bottom:none}
.rw-lbl{font-size:12.5px;color:#6B6B63}
.rw-val{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
.rw-val a{color:#171717}
.exp-hd{display:flex;align-items:center;justify-content:space-between}
.cons-lbl{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.1em;color:var(--ink-6);text-align:right}
.cons-val{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;text-align:right}
.exp-list{margin-top:8px}
.exp-row{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #F2F2EC}
.exp-av{width:30px;height:30px;border-radius:999px;background:#F0F0EC;color:var(--ink);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10.5px;font-weight:600;flex:none}
.exp-nm{font-size:12.5px;font-weight:600;color:var(--ink)}
.exp-pr{font-family:var(--mono);font-size:12.5px;font-weight:600;color:#383832;font-variant-numeric:tabular-nums}
.exp-role{font-size:11px;color:#9A9A90;margin-top:1px}
.exp-take{font-size:12px;color:#55554E;line-height:1.5;margin-top:6px}
.exp-del{margin-left:8px;color:#C4C4BB;cursor:pointer;font-size:14px;line-height:1}
.exp-del:hover{color:#8A8A80}
.mini-form{display:flex;flex-direction:column;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid #EFEFE9}
.mini-in{width:100%;border:1px solid #E2E2DA;border-radius:7px;padding:8px 10px;font-size:12.5px;color:var(--ink)}
.mini-in:focus{border-color:var(--ink)}
.mini-row{display:flex;gap:8px}
.mini-btn{font-size:12px;font-weight:600;color:#383832;background:#F4F4F0;border:1px solid #E2E2DA;border-radius:7px;padding:8px 14px;cursor:pointer;white-space:nowrap}
.mini-btn:hover{background:#ECECE5}

/* Quoting */
.rfq-hd{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.rfq-live{flex:none;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.08em;color:var(--ink);white-space:nowrap}
.qt-tbl{border:1px solid rgba(24,24,24,.10);border-radius:12px;background:#fff;margin-top:12px;overflow:hidden}
.qt-head{display:grid;grid-template-columns:2.4fr 1fr 1fr 50px;gap:14px;padding:12px 20px;border-bottom:1px solid #F0F0EA;font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.1em;color:var(--ink-6)}
.qt-row{display:grid;grid-template-columns:2.4fr 1fr 1fr 50px;gap:14px;align-items:center;padding:14px 20px;border-bottom:1px solid #F4F4EE}
.qt-row:last-child{border-bottom:none}
.qt-nm{font-size:13.5px;font-weight:600;color:var(--ink)}
.qt-pr{text-align:right;font-family:var(--mono);font-size:13px;font-weight:600;color:#171717;font-variant-numeric:tabular-nums}
.qt-sz{text-align:right;font-family:var(--mono);font-size:12.5px;color:#3D3D38;font-variant-numeric:tabular-nums}
.qt-del{text-align:right;color:#C4C4BB;cursor:pointer}
.qt-del:hover{color:#8A8A80}
.al-tbl{border:1px solid rgba(24,24,24,.10);border-radius:12px;background:#fff;margin-top:12px;overflow:hidden}
.al-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:14px;align-items:center;padding:13px 20px;border-bottom:1px solid #F4F4EE}
.al-nm{font-size:13px;color:var(--ink)}
.al-lift{color:#A8A89F}
.al-pr,.al-prem{text-align:right;font-family:var(--mono);font-size:12.5px;color:#3D3D38;font-variant-numeric:tabular-nums}
.al-sz{text-align:right;font-family:var(--mono);font-size:12.5px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
.al-tot{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 20px;background:#FAFAF7}
.al-tot-lbl{font-size:13.5px;font-weight:600;color:var(--ink)}
.al-tot-sub{font-size:11.5px;color:#7A7A70;margin-top:2px}
.al-tot-val{font-family:var(--mono);font-weight:600;font-size:24px;color:var(--ink);font-variant-numeric:tabular-nums}

/* Settled */
.settled-banner{display:flex;align-items:center;gap:12px;background:#F5F5F2;border:1px solid #E6E6E0;border-radius:12px;padding:18px 22px}
.settled-icon{flex:none;width:34px;height:34px;border-radius:999px;background:#2A2A26;display:flex;align-items:center;justify-content:center}
.settled-t{font-size:14.5px;font-weight:600;color:var(--ink)}
.settled-s{font-size:12.5px;color:#55554E;margin-top:2px;line-height:1.5}
.set-stats{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid rgba(24,24,24,.10);border-radius:12px;overflow:hidden;margin-top:16px}
.set-tile{padding:18px 20px}
.set-tile:not(:last-child){border-right:1px solid rgba(24,24,24,.07)}

/* Modal */
.modal-bg{position:fixed;inset:0;z-index:50;background:rgba(24,24,22,.42);display:flex;align-items:flex-start;justify-content:center;padding:60px 20px;overflow-y:auto;animation:fadein .15s ease}
.modal{width:100%;max-width:560px;background:#fff;border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,.28);overflow:hidden;animation:fadein .2s ease}
.modal-hd{display:flex;align-items:flex-start;gap:12px;padding:22px 24px 0}
.modal-kick{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.14em;color:var(--ink-6)}
.modal-t{font-family:var(--serif);font-size:19px;font-weight:400;color:var(--ink);margin-top:5px;line-height:1.2}
.modal-x{margin-left:auto;width:30px;height:30px;border-radius:8px;background:#F4F4F0;color:#6B6B63;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex:none}
.modal-x:hover{background:#ECECE5}
.modal-body{padding:18px 24px 24px}
.modal-sub{font-size:12.5px;color:var(--ink-4);line-height:1.55}

function phIdx(p){return PHASES.indexOf(p)}
function covM(t){return parseFloat((t.coverage||'').replace(/[^0-9.]/g,''))||0}
function covLabel(t){const c=(t.coverage||'').trim();return c&&c!=='$TBD'?c:'TBD'}
function fmtM(x){if(x>0&&x<0.9995)return '$'+Math.round(x*1000)+'K';const r=Math.round(x*10)/10;return '$'+(Number.isInteger(r)?r:r.toFixed(1))+'M'}
function initials(n){const w=(n||'').trim().split(/\s+/);if(!w[0])return'—';return((w[0][0]||'')+(w[1]?w[1][0]:(w[0][1]||''))).toUpperCase()}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function attr(s){return esc(s).replace(/'/g,'&#39;')}
function badgeHtml(phase){const b=BADGE[phase];return`<span class="badge" style="color:${b.fg};background:${b.bg}">${b.label}</span>`}
function impliedOf(t){return (t.market&&t.market.yes!=null)?t.market.yes+'%':(t.prob!=null?t.prob+'%':'—')}
function tradeName(t){return (t.company||'').trim()||(t.title||'').trim()||'Untitled trade'}
function tradeFull(t){const c=(t.company||'').trim(),ti=(t.title||'').trim();if(c&&ti)return c+' — '+ti;return ti||c||'Untitled trade'}

const CONTRACT_CATALOG=['SEC Quarterly Reporting Requirement','SEC §204A Alt-Data MNPI Liability','CPPA Data-Broker Enforcement','Reddit v. SerpApi — Web-Scraping Ruling','Amazon robots.txt Bot-Blocking','§48E Solar ITC Reinstatement','§179D Deduction Reinstatement','Visa Interchange Rates','Prediction-Market Tax Treatment','Section 232 Copper Tariffs','IIJA Reauthorization','IRA Tax-Credit Phaseout','Data-Center Permitting Moratorium','Nuevo León Unemployment Ladder']
function tradeOptions(cur){
  cur=(cur||'').trim()
  const list=CONTRACT_CATALOG.slice()
  if(cur&&!list.includes(cur))list.unshift(cur)
  const opts=list.map(c=>`<option value="${attr(c)}"${c===cur?' selected':''}>${esc(c)}</option>`).join('')
  return (cur?'':`<option value="" selected disabled>Select a contract…</option>`)+opts
}

// Parse pasted contract prose into renderable blocks: blank-line-separated paragraphs,
// bullet lines (starting - • *) collapse into a bullet block, a short "Lead-in:" becomes an opener.
function parseContractBody(raw){
  const text=(raw||'').replace(/\r/g,'').trim();if(!text)return null
  const out=[]
  text.split(/\n\s*\n/).forEach(block=>{
    const lines=block.split(/\n/).map(l=>l.trim()).filter(Boolean)
    let buf=[],bul=[]
    const flushText=()=>{if(!buf.length)return;const joined=buf.join(' ');const m=joined.match(/^([A-Z][A-Za-z0-9 ,()§\/'’-]{2,42}:)\s+(.+)$/);out.push(m?{opener:m[1],text:m[2]}:{text:joined});buf=[]}
    const flushBul=()=>{if(!bul.length)return;out.push({bullets:bul.slice()});bul=[]}
    lines.forEach(l=>{
      if(/^[-•*]\s+/.test(l)){flushText();bul.push(l.replace(/^[-•*]\s+/,''))}
      else{flushBul();buf.push(l)}
    })
    flushText();flushBul()
  })
  return out.length?out:null
}

function spark(prob,seed){
  const n=22,W=640,H=150,pts=[]
  let v=prob-9+((seed%5)-2)
  for(let i=0;i<n;i++){
    const drift=(prob-v)*0.18
    const wob=Math.sin((i+seed)*.9)*2.1+Math.sin((i+seed)*.37)*1.3
    v=v+drift+wob
    if(i===n-1)v=prob
    const x=(i/(n-1))*W,y=H-8-(Math.max(2,Math.min(96,v))/100)*(H-16)
    pts.push([x.toFixed(1),y.toFixed(1)])
  }
  const line=pts.map(p=>p[0]+','+p[1]).join(' ')
  return{line,area:'0,'+H+' '+line+' '+W+','+H}
}
// Plot a real price series (0-100 values) to the same chart geometry — mirrors the exchange graph.
function seriesSpark(vals){
  const W=640,H=150,n=vals.length
  const pts=vals.map((v,i)=>{
    const x=n>1?(i/(n-1))*W:0,y=H-8-(Math.max(2,Math.min(96,v))/100)*(H-16)
    return[x.toFixed(1),y.toFixed(1)]
  })
  const line=pts.map(p=>p[0]+','+p[1]).join(' ')
  return{line,area:'0,'+H+' '+line+' '+W+','+H}
}
// X-axis date ticks for the price chart — assumes daily points ending at the trade's last-update date.
function chartDates(t){
  const n=(t.history&&t.history.length)||30
  let end=new Date()
  const mm=String(t.marketAt||'').match(/(\d{4})-(\d{2})-(\d{2})/)
  if(mm)end=new Date(+mm[1],+mm[2]-1,+mm[3])
  const ticks=4,out=[]
  for(let i=0;i<ticks;i++){
    const daysAgo=Math.round((n-1)*(1-i/(ticks-1)))
    const d=new Date(end.getTime());d.setDate(d.getDate()-daysAgo)
    out.push(d.toLocaleDateString('en-US',{month:'short',day:'numeric'}))
  }
  return out
}

  S.seq=(S.seq||0)+1

  const id=S.activeId,g=x=>(document.getElementById(x)||{}).value||''
  const yes=parseFloat(g('mk-yes')),no=parseFloat(g('mk-no')),vol=g('mk-vol').trim(),liq=g('mk-liq').trim()
  upd(id,{market:{yes:isNaN(yes)?null:yes,no:isNaN(no)?null:no,vol:vol||'—',liq},marketAt:'updated just now'})
  logActivity(id,'market','Live market data pulled'+(isNaN(yes)?'':' · YES '+yes+'%')+(vol?' · vol '+vol:''))
  closeHandoff();render()
}
window.saveDoc=function(){
  const id=S.activeId
  const url=((document.getElementById('ho-doc')||{}).value||'').trim()
  const body=((document.getElementById('ho-contract')||{}).value||'')
  const patch={phase:'contract'}
  if(url)patch.docUrl=url
  const parsed=parseContractBody(body)
  if(parsed&&parsed.length)patch.contract=parsed
  upd(id,patch)
  logActivity(id,'contract','Contract generated as a Google Doc'+(parsed&&parsed.length?' · '+parsed.length+' clauses loaded':''))
  logEmail(id,'contract','Contract generated — '+tradeName(S.trades[id]))
  S.viewPhase='contract';closeHandoff();render();window.scrollTo(0,0)
}
window.saveComments=function(){
  const id=S.activeId,raw=((document.getElementById('ho-comments')||{}).value||'').trim()
  if(!raw){closeHandoff();return}
  const t=S.trades[id]
  const adds=raw.split(/\n/).map(l=>l.trim()).filter(Boolean).map(l=>{
    S.seq=(S.seq||0)+1
    const m=l.match(/^(.{1,40}?)\s*[:—]\s+(.+)$/)
    return m?{id:'c'+S.seq,who:m[1].trim(),text:m[2].trim(),status:'open'}:{id:'c'+S.seq,who:'Reviewer',text:l,status:'open'}
  })
  upd(id,{suggestions:[...(t.suggestions||[]),...adds]})
  logActivity(id,'comments',adds.length+' edit request'+(adds.length===1?'':'s')+' pulled from the Doc')
  closeHandoff();render()
}
window.saveQuotesIn=function(){
  const id=S.activeId,raw=((document.getElementById('ho-quotes')||{}).value||'').trim()
  if(!raw){closeHandoff();return}
  const t=S.trades[id],adds=[]
  raw.split(/\n/).map(l=>l.trim()).filter(Boolean).forEach(l=>{
    const p=l.split(/[,\t|]+/).map(x=>x.trim()).filter(Boolean)
    const name=p[0],price=(p[1]||'').replace(/[^0-9.]/g,'')
    if(!name||!price)return
    S.seq=(S.seq||0)+1
    adds.push({id:'q'+S.seq,name,price,size:p[2]||''})
  })
  if(adds.length){upd(id,{quotes:[...(t.quotes||[]),...adds]});logActivity(id,'quotes',adds.length+' quote'+(adds.length===1?'':'s')+' ingested from RFQ replies')}
  closeHandoff();render()
}
window.saveGranola=function(){const id=S.activeId,url=((document.getElementById('ho-granola')||{}).value||'').trim();upd(id,{granolaUrl:url});if(url)logActivity(id,'granola','Granola meeting linked for expert pull');closeHandoff();render()}

function expertSummary(t){
  const ex=(t.experts||[])
  if(!ex.length)return 'No expert views recorded yet.'
  const probs=ex.map(e=>parseFloat((e.prob||'').replace(/[^0-9.]/g,''))).filter(x=>!isNaN(x))
  const cons=probs.length?Math.round(probs.reduce((a,b)=>a+b,0)/probs.length)+'%':'n/a'
  const lines=ex.map(e=>`- ${e.name}${e.role?' ('+e.role+')':''}${e.prob?' — '+e.prob:''}${e.take?': '+e.take:''}`).join('\n')
  return `Consensus: ${cons}\n${lines}`
}

// ─── VIEW MODELS ──────────────────────────────────────────────────────────────
function quotesVM(t){
  // Cost-minimizing allocation: the customer buys `cov` of protection, so we fill
  // from the cheapest offers upward until coverage is met (cheapest premium possible).
  const cov=covM(t)
  const qs=(t.quotes||[]).map(q=>{
    const pr=parseFloat((q.price||'').replace(/[^0-9.]/g,''))||0
    const sz=parseFloat((q.size||'').replace(/[^0-9.]/g,''))
    return{...q,_pr:pr,_sz:isNaN(sz)?null:sz}
  }).sort((a,b)=>a._pr-b._pr)
  let alloc=[],remaining=cov
  for(const q of qs){
    if(cov&&remaining<=1e-9)break
    const avail=q._sz!=null?q._sz:(cov?remaining:0)
    const take=cov?Math.min(avail,remaining):(q._sz!=null?q._sz:0)
    if(take<=0)continue
    const sz=Math.round(take*10)/10
    alloc.push({name:q.name,price:q._pr+'¢',size:fmtM(sz),premium:fmtM(sz*q._pr/100),_sz:sz,_pr:q._pr})
    if(cov)remaining-=take
  }
  const totSize=alloc.reduce((a,b)=>a+(b._sz||0),0)
  const totPrem=alloc.reduce((a,b)=>a+(b._sz?b._sz*b._pr/100:0),0)
  const wavg=totSize?(totPrem/totSize*100).toFixed(1)+'¢':'—'
  const shortfall=cov&&remaining>1e-9?Math.round(remaining*10)/10:0
  return{quotes:qs,alloc,wavg,totalPremium:totPrem?fmtM(totPrem):'—',respIn:qs.length,shortfall}
}

        ${t.docUrl?`<button class="sugg-add-btn" style="margin-top:14px" onclick="openHandoff('comments')">Pull edit requests from Doc →</button>`:''}
        <div class="sugg-add"><textarea class="sugg-ta" rows="2" placeholder="Request a change to the contract…" oninput="draftChange(this)">${esc(S.suggestDraft)}</textarea><button class="sugg-add-btn" onclick="addSuggestion()">Add manually</button></div>
        <div class="share-note">Reviewers comment on the shared Google Doc; pull those comments here for accept / dismiss.</div>
      </div>
    </div>
  </div></div>`
}

// ─── RENDER: LISTING ANIMATION ────────────────────────────────────────────────
function renderListing(){
  const steps=[{label:'Emailing '+TEAM,done:true},{label:'Listing for price discovery',done:true},{label:'Opening order book',done:false}]
  const stepsHtml=steps.map(s=>{
    const dotStyle=s.done?'background:#171717;color:#fff':'border:2px solid #ECECE6;border-top-color:#171717;animation:spin .8s linear infinite'
    return`<div class="ls-step" style="color:${s.done?'#383832':'#A0A096'}"><div class="ls-dot" style="${dotStyle}">${s.done?'✓':''}</div>${esc(s.label)}</div>`
  }).join('')
  return`<div class="panel"><div class="listing-card"><div class="spinner"></div><div class="listing-t">Sending to the exchange</div><div class="listing-s">Notifying ${TEAM} with the contract resolution and listing the market for price discovery.</div><div class="listing-steps">${stepsHtml}</div></div></div>`
}

// ─── RENDER: EXCHANGE ─────────────────────────────────────────────────────────
function renderExchange(t,cur){
  const isCurrent=cur===2,m=t.market||{}
  const yes=m.yes!=null?m.yes:(t.prob!=null?t.prob:50)
  const sp=(t.history&&t.history.length>1)?seriesSpark(t.history):spark(yes,(t.ref||'').length||7)
  const xd=chartDates(t)
  const metrics=[{lbl:'IMPLIED YES',val:m.yes!=null?m.yes+'%':'—',sub:t.marketAt||'last'},{lbl:'VOLUME',val:m.vol||'—',sub:'traded'},{lbl:'VENUE',val:t.marketVenue||'—',sub:'price discovery'}]
  const metricsHtml=metrics.map(x=>`<div class="m-tile"><div class="m-lbl">${x.lbl}</div><div class="m-val">${esc(x.val)}</div><div class="m-sub">${esc(x.sub)}</div></div>`).join('')
  const experts=(t.experts||[])
  const probs=experts.map(e=>parseFloat((e.prob||'').replace(/[^0-9.]/g,''))).filter(x=>!isNaN(x))
  const consensus=probs.length?Math.round(probs.reduce((a,b)=>a+b,0)/probs.length)+'%':'—'
  const expertsHtml=experts.length?experts.map(e=>`<div class="exp-row"><div class="exp-av">${initials(e.name)}</div><div style="min-width:0;flex:1"><div style="display:flex;align-items:baseline;justify-content:space-between;gap:10px"><span class="exp-nm">${esc(e.name)}</span><span style="display:flex;align-items:center"><span class="exp-pr">${esc(e.prob||'—')}</span><span class="exp-del" onclick="delExpert('${e.id}')" title="Remove">×</span></span></div>${e.role?`<div class="exp-role">${esc(e.role)}</div>`:''}${e.take?`<div class="exp-take">${esc(e.take)}</div>`:''}</div></div>`).join(''):`<div style="font-size:12px;color:#9A9A90;line-height:1.5;padding:10px 0">No experts yet. Add names manually, or pull views from a Granola meeting.</div>`
  return`<div class="panel">
    <div class="metrics">${metricsHtml}</div>
    <div class="chart-card">
      <div class="chart-hd"><div class="chart-t">Implied probability — YES</div><div class="live-ind"><span class="live-dot"></span>${m.yes!=null?'LIVE':'NO DATA'}</div></div>
      <div class="chart-body">
        <div class="y-ax"><span style="top:8px">100%</span><span style="top:41.5px">75%</span><span style="top:75px">50%</span><span style="top:108.5px">25%</span><span style="top:142px">0%</span></div>
        <div class="plot-col">
          <svg viewBox="0 0 640 150" preserveAspectRatio="none" style="width:100%;height:150px;display:block"><line x1="0" y1="41.5" x2="640" y2="41.5" stroke="#F0F0EA" stroke-width="1"/><line x1="0" y1="75" x2="640" y2="75" stroke="#F0F0EA" stroke-width="1"/><line x1="0" y1="108.5" x2="640" y2="108.5" stroke="#F0F0EA" stroke-width="1"/><line x1="0" y1="142" x2="640" y2="142" stroke="#E2E2DA" stroke-width="1"/><polyline points="${sp.area}" fill="rgba(24,24,24,0.06)" stroke="none"/><polyline points="${sp.line}" fill="none" stroke="#171717" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg>
          <div class="x-ax">${xd.map(d=>`<span>${esc(d)}</span>`).join('')}</div>
        </div>
      </div>
      <div class="m-sub" style="margin-top:8px">Illustrative path to the current implied level${m.yes!=null?'':' (awaiting live data)'}.</div>
    </div>
    <div class="ex-lower">
      <div class="ex-card">
        <div class="ex-card-t">${ICO.bolt}Live market</div>
        <div class="rw-list"><div class="rw-row"><span class="rw-lbl">Venue</span><span class="rw-val">${esc(t.marketVenue||'—')}</span></div><div class="rw-row"><span class="rw-lbl">Market link</span><span class="rw-val">${t.marketUrl?`<a href="${attr(t.marketUrl)}" target="_blank" rel="noopener">Open ${ICO.link}</a>`:'—'}</span></div><div class="rw-row"><span class="rw-lbl">Liquidity incentives</span><span class="rw-val">${esc((m.liq&&m.liq.trim())||'—')}</span></div><div class="rw-row"><span class="rw-lbl">Last update</span><span class="rw-val">${esc(t.marketAt||'—')}</span></div></div>
        <div class="mini-form"><label class="fld-lbl">CONTRACT LINK (KALSHI / POLYMARKET)</label><input class="mini-in" value="${attr(t.marketUrl)}" placeholder="Paste market URL…" oninput="fldChange('${t.id}','marketUrl',this)"><button class="mini-btn" onclick="openHandoff('market')" style="margin-top:2px">Pull live data →</button></div>
      </div>
      <div class="ex-card">
        <div class="exp-hd"><div class="ex-card-t">${ICO.users}Expert network</div><div><div class="cons-lbl">CONSENSUS</div><div class="cons-val">${consensus}</div></div></div>
        <div class="exp-list">${expertsHtml}</div>
        <div class="mini-form"><div class="mini-row"><input id="exp-name" class="mini-in" placeholder="Name"><input id="exp-prob" class="mini-in" placeholder="View % (e.g. 30%)" style="max-width:140px"></div><input id="exp-role" class="mini-in" placeholder="Role / affiliation"><input id="exp-take" class="mini-in" placeholder="One-line take (optional)"><div class="mini-row"><button class="mini-btn" onclick="addExpert()">Add expert</button><button class="mini-btn" onclick="openHandoff('granola')">Pull from Granola →</button></div>${t.granolaUrl?`<div class="share-note">Granola: <a href="${attr(t.granolaUrl)}" target="_blank" rel="noopener">linked ${ICO.link}</a></div>`:''}</div>
      </div>
    </div>
    ${isCurrent?`<button class="btn-primary" onclick="openHandoff('rfq')" style="margin-top:24px">Send to market makers ${ICO.arrow}</button>`:''}
  </div>`
}

// ─── RENDER: QUOTING ──────────────────────────────────────────────────────────
function renderQuoting(t,cur){
  const isCurrent=cur===3,vm=quotesVM(t),cov=covLabel(t),covNum=covM(t)
  const sent=(t.emails||[]).some(e=>e.kind==='rfq')
  const quotesHtml=vm.quotes.length?vm.quotes.map(q=>`<div class="qt-row"><div class="qt-nm">${esc(q.name)}</div><div class="qt-pr">${esc((q.price||'').replace(/[^0-9.]/g,''))}¢</div><div class="qt-sz">${q._sz!=null&&covNum?Math.round(q._sz/covNum*100)+'%':esc(q.size||'—')}</div><div class="qt-del" onclick="delQuote('${q.id}')" title="Remove">×</div></div>`).join(''):`<div style="padding:22px 20px;font-size:12.5px;color:#9A9A90;line-height:1.5">No quotes yet. ${TEAM} (acting for the makers) replies to the RFQ; enter each synthetic quote below and it populates here.</div>`
  const allocHtml=vm.alloc.map(a=>`<div class="al-row"><div class="al-nm">${esc(a.name)} <span class="al-lift">· lift offer</span></div><div class="al-pr">${esc(a.price)}</div><div class="al-sz">${esc(a.size)}</div><div class="al-prem">${esc(a.premium)}</div></div>`).join('')
  return`<div class="panel">
    <div class="rfq-hd"><div>${sent?`<span class="sent-pill">${ICO.checkSm} RFQ emailed to ${TEAM}</span>`:`<button class="btn-ghost" onclick="openHandoff('rfq')">${ICO.mail} Email RFQ to ${TEAM}</button>`}</div><div class="rfq-live"><span class="live-dot"></span>RFQ LIVE · ${vm.respIn} IN</div></div>
    <div class="p-label" style="margin-top:24px">INBOUND QUOTES</div>
    <div class="qt-tbl"><div class="qt-head"><div>MARKET MAKER</div><div style="text-align:right">OFFER</div><div style="text-align:right">SIZE</div><div></div></div>${quotesHtml}</div>
    <div class="mini-form" style="border-top:none;margin-top:12px"><div class="mini-row"><input id="q-name" class="mini-in" placeholder="Market maker (e.g. SIG, Jump)"><input id="q-price" class="mini-in" placeholder="Offer ¢" style="max-width:110px"><input id="q-size" class="mini-in" placeholder="Size $M" style="max-width:120px"><button class="mini-btn" onclick="addQuote()">Add quote</button></div>${sent?`<button class="mini-btn" style="margin-top:2px;align-self:flex-start" onclick="openHandoff('quotes-in')">Pull quotes from RFQ replies →</button>`:''}</div>
    ${vm.alloc.length?`<div class="p-label" style="margin-top:26px">SUGGESTED ALLOCATION · LOWEST COST TO CUSTOMER</div><div class="al-tbl">${allocHtml}<div class="al-tot"><div><div class="al-tot-lbl">Total premium to be paid</div><div class="al-tot-sub">Cheapest fill: weighted average ${vm.wavg} across ${cov} of protection${vm.shortfall?` · ${fmtM(vm.shortfall)} unfilled (need more quotes)`:''}</div></div><div class="al-tot-val">${vm.totalPremium}</div></div></div>`:''}
    ${isCurrent?renderApprovalCta(t,vm):''}
  </div>`
}
function renderApprovalCta(t,vm){
  if(t.approval==='pending')return`<div class="settled-banner" style="margin-top:24px"><div class="settled-icon" style="background:#6B6B63">${ICO.mail}</div><div><div class="settled-t">Quote sent to customer — awaiting approval</div><div class="settled-s">${TEAM} (acting as the customer) replies APPROVE or DENY. Reflect their decision:</div></div></div>
    <div class="modal-actions" style="margin-top:14px"><button class="btn-primary" onclick="markSettled()">${ICO.checkSm} Customer approved → Settle</button><button class="btn-ghost" onclick="markDenied()">Customer denied</button></div>`
  if(t.approval==='denied')return`<div class="empty" style="margin-top:24px;text-align:left;border-color:#E6D6D0">Customer declined the quote. Revise the quotes / allocation, then re-send.</div>
    <button class="btn-primary" onclick="openHandoff('customer')" style="margin-top:14px" ${vm.quotes.length?'':'disabled'}>Re-send quote to customer ${ICO.arrow}</button>`
  return`<button class="btn-primary" onclick="openHandoff('customer')" style="margin-top:24px" ${vm.quotes.length?'':'disabled'}>Send quote to customer ${ICO.arrow}</button>`
}

// ─── RENDER: SETTLED ──────────────────────────────────────────────────────────
function renderSettled(t){
  const vm=quotesVM(t),cov=covLabel(t)
  const stats=[{lbl:'PREMIUM PAID',val:vm.totalPremium,sub:'to makers'},{lbl:'WEIGHTED AVG',val:vm.wavg,sub:'fill price'},{lbl:'COVERAGE',val:cov,sub:'bound'},{lbl:'MAKERS',val:String(vm.alloc.length),sub:'allocated'}]
  const statsHtml=stats.map(s=>`<div class="set-tile"><div class="m-lbl">${s.lbl}</div><div style="font-family:var(--mono);font-size:20px;font-weight:600;color:#171717;margin-top:8px;font-variant-numeric:tabular-nums">${esc(s.val)}</div><div class="m-sub">${s.sub}</div></div>`).join('')
  const allocHtml=vm.alloc.map(a=>`<div class="al-row"><div class="al-nm">${esc(a.name)}</div><div class="al-pr">${esc(a.price)}</div><div class="al-sz">${esc(a.size)}</div><div class="al-prem">${esc(a.premium)}</div></div>`).join('')
  return`<div class="panel">
    <div class="settled-banner"><div class="settled-icon">${ICO.check}</div><div><div class="settled-t">Quote accepted — protection bound</div><div class="settled-s">${esc(tradeFull(t))} executed ${cov} of coverage. ${TEAM} confirmed settlement. Settles on event resolution${t.resolution?` · ${esc(t.resolution)}`:''}.</div></div></div>
    <div class="set-stats">${statsHtml}</div>
    ${vm.alloc.length?`<div class="p-label" style="margin-top:26px">FINAL ALLOCATION</div><div class="al-tbl">${allocHtml}</div>`:''}
  </div>`
}

// ─── RENDER: ACTIVITY ─────────────────────────────────────────────────────────
function renderActivity(t){
  const a=(t.activity||[])
  if(!a.length)return''
  const rows=a.slice().reverse().map(x=>`<div class="act-row"><span class="act-dot"></span><div class="act-txt">${esc(x.text)}</div><span class="act-at">${esc(x.at)}</span></div>`).join('')
  return`<div class="act-wrap"><div class="p-label" style="margin:0">ACTIVITY</div><div class="act-list">${rows}</div></div>`
}

// ─── RENDER: DETAIL ───────────────────────────────────────────────────────────
function renderDetail(){
  const t=S.trades[S.activeId];if(!t)return''
  const cur=phIdx(t.phase),vp=S.viewPhase||t.phase
  let panel=''
  if(S.listing)panel=renderListing()
  else if(vp==='intake')panel=renderIntake(t,cur)
  else if(vp==='contract')panel=renderContract(t,cur)
  else if(vp==='exchange')panel=renderExchange(t,cur)
  else if(vp==='quoting')panel=renderQuoting(t,cur)
  else if(vp==='settled')panel=renderSettled(t)
  return`<div class="det-wrap">
    <button class="back-btn" onclick="backToList()">${ICO.back}Trade book</button>
    <div class="det-hd"><div style="min-width:0"><div class="trade-name">${esc(tradeName(t))}</div><div class="det-meta"><span class="det-ref">${esc(t.ref)}</span>${badgeHtml(t.phase)}${t.status?`<span class="det-status">${esc(t.status)}</span>`:''}</div></div>
      <div class="tiles"><div class="tile"><div class="tile-lbl">COVERAGE</div><div class="tile-val">${esc(covLabel(t))}</div></div><div class="tile"><div class="tile-lbl">IMPLIED</div><div class="tile-val">${impliedOf(t)}</div></div></div>
    </div>
    ${renderPhaseNav(t,vp)}
    ${panel}
  </div>`
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML=renderTopBar()+(S.view==='list'?renderList():renderDetail())+renderHandoff()
}
render()
</script>
